<style>
  .modal-content{
    background: #212121;
  }
</style>

<!-- More Info Modal -->

<div class="modal fade" id="Modal-MoreInfo-{{ item.id }}"
  tabindex="-1" 
  aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="ModalLabel">{{ item.name }}</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <p><strong>Description:</strong> {{ item.description }}</p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
        <!-- <button type="button" class="btn btn-primary">Save changes</button> -->
      </div>
    </div>
  </div>
</div>

<!-- Purchase Confirmation Modal -->
<div class="modal fade" id="Modal-PurchaseConfirm-{{ item.id }}"
  tabindex="-1" 
  aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title" id="ModalLabel">{{ item.name }}</h2>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <form action="" method="post">
          {{ purchase_form.hidden_tag() }}

          <h4 class="text-center">
            Are you sure you want to purchase {{ item.name }} for {{ item.price }}$?
          </h4>
          <br>
          <input id = "purchased_item" type="hidden" name="purchased_item" value="{{ item.id }}">
          {{ purchase_form.submit(class='btn btn-outline-success btn-block') }}

        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
        <!-- <button type="button" class="btn btn-primary">Save changes</button> -->
      </div>
    </div>
  </div>
</div>
